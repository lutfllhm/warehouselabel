# Konfigurasi Nginx di Host VPS untuk Warehouse Label
# Letakkan file ini di: /etc/nginx/sites-available/warehouselabel.iwareid.com
# Lalu buat symlink: sudo ln -s /etc/nginx/sites-available/warehouselabel.iwareid.com /etc/nginx/sites-enabled/

# Redirect www to non-www
server {
    listen 80;
    server_name www.warehouselabel.iwareid.com;
    return 301 http://warehouselabel.iwareid.com$request_uri;
}

# Main server block
server {
    listen 80;
    server_name warehouselabel.iwareid.com;

    # Logging
    access_log /var/log/nginx/warehouselabel-access.log;
    error_log /var/log/nginx/warehouselabel-error.log;

    # Proxy to Docker container (port 9000)
    location / {
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Timeout settings
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Client max body size (untuk upload file) 
    client_max_body_size 50M;
}

# HTTPS akan otomatis ditambahkan oleh Certbot saat setup SSL
# Jangan uncomment manual, biarkan Certbot yang handle
