<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Theme - RBM Warehouse</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      padding: 2rem;
      background: #f1f5f9;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background: white;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    h1 { color: #1e293b; margin-bottom: 1rem; }
    p { color: #64748b; margin-bottom: 1.5rem; line-height: 1.6; }
    button {
      width: 100%;
      padding: 12px 24px;
      margin-bottom: 12px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-light {
      background: #ffffff;
      color: #1e293b;
      border: 2px solid #e2e8f0;
    }
    .btn-light:hover { background: #f8fafc; }
    .btn-dark {
      background: #1e293b;
      color: white;
    }
    .btn-dark:hover { background: #334155; }
    .btn-reset {
      background: #ef4444;
      color: white;
    }
    .btn-reset:hover { background: #dc2626; }
    .btn-back {
      background: #6366f1;
      color: white;
    }
    .btn-back:hover { background: #4f46e5; }
    .status {
      padding: 12px;
      border-radius: 8px;
      margin-top: 1rem;
      font-size: 14px;
    }
    .status.success {
      background: #dcfce7;
      color: #166534;
      border: 1px solid #86efac;
    }
    .status.info {
      background: #dbeafe;
      color: #1e40af;
      border: 1px solid #93c5fd;
    }
    code {
      background: #f1f5f9;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔧 Theme Reset Tool</h1>
    <p>Gunakan tool ini untuk memperbaiki masalah theme toggle yang tidak berfungsi.</p>
    
    <button class="btn-light" onclick="setLight()">
      ☀️ Set Light Mode
    </button>
    
    <button class="btn-dark" onclick="setDark()">
      🌙 Set Dark Mode
    </button>
    
    <button class="btn-reset" onclick="resetTheme()">
      🔄 Reset Theme System
    </button>
    
    <button class="btn-back" onclick="goBack()">
      ← Kembali ke Aplikasi
    </button>
    
    <div id="status"></div>
  </div>

  <script>
    function showStatus(message, type = 'success') {
      const status = document.getElementById('status');
      status.className = `status ${type}`;
      status.innerHTML = message;
      setTimeout(() => {
        status.style.opacity = '0';
        setTimeout(() => {
          status.style.opacity = '1';
        }, 300);
      }, 100);
    }

    function setLight() {
      try {
        localStorage.setItem('theme', 'light');
        showStatus('✅ Theme diset ke <code>light</code><br>Silakan refresh halaman aplikasi.', 'success');
        console.log('[Reset Tool] Theme set to: light');
      } catch (e) {
        showStatus('❌ Error: ' + e.message, 'error');
      }
    }

    function setDark() {
      try {
        localStorage.setItem('theme', 'dark');
        showStatus('✅ Theme diset ke <code>dark</code><br>Silakan refresh halaman aplikasi.', 'success');
        console.log('[Reset Tool] Theme set to: dark');
      } catch (e) {
        showStatus('❌ Error: ' + e.message, 'error');
      }
    }

    function resetTheme() {
      try {
        localStorage.removeItem('theme');
        showStatus('✅ Theme system direset<br>Default: <code>light</code> mode<br>Silakan refresh halaman aplikasi.', 'success');
        console.log('[Reset Tool] Theme system reset');
      } catch (e) {
        showStatus('❌ Error: ' + e.message, 'error');
      }
    }

    function goBack() {
      window.location.href = '/';
    }

    // Show current status on load
    window.addEventListener('load', () => {
      const current = localStorage.getItem('theme') || 'not set (default: light)';
      showStatus(`ℹ️ Current theme: <code>${current}</code>`, 'info');
    });
  </script>
</body>
</html>
